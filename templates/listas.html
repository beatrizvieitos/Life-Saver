<script>
    // =========================================================================
    // 1. VARIÁVEIS GLOBAIS
    // =========================================================================
    let todasAsComprasGlobais = [];     // Armazena todos os itens para o Modo Compras
    let filtroAtivo = '';              // Filtro ativo na página principal

    const selectProduto = document.getElementById('produto');
    const selectSupermercado = document.getElementById('supermercado');
    const inputPreco = document.getElementById('preco');
    const avisoPreco = document.getElementById('dica-preco');

    // =========================================================================
    // 2. FUNÇÕES AUXILIARES (escapeHtml, getDisplayName)
    // =========================================================================
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getDisplayName(user) {
        if (user.nome && user.apelido) {
            return escapeHtml(user.nome) + ' ' + escapeHtml(user.apelido);
        } else if (user.username) {
            return escapeHtml(user.username);
        }
        return '';
    }

    // =========================================================================
    // 3. FUNÇÕES DE PREÇOS (estimado e mais barato)
    // =========================================================================
    async function procurarPreco() {
        const produto = selectProduto.value;
        const supermercado = selectSupermercado.value;
        if (produto && supermercado) {
            try {
                const resposta = await fetch(`/api/preco_estimado?produto=${encodeURIComponent(produto)}&supermercado=${encodeURIComponent(supermercado)}`);
                const dados = await resposta.json();
                if (dados.preco !== null) {
                    inputPreco.value = dados.preco;
                    avisoPreco.style.display = 'none';
                } else {
                    inputPreco.value = '';
                    avisoPreco.style.display = 'flex';
                }
            } catch (erro) {
                console.error("Erro ao procurar preço:", erro);
            }
        }
    }

    selectProduto.addEventListener('change', procurarPreco);
    selectSupermercado.addEventListener('change', procurarPreco);

    if (selectProduto) {
        selectProduto.addEventListener('change', async function() {
            const produto = this.value;
            if (!produto) {
                avisoPreco.style.display = 'none';
                return;
            }
            try {
                const resposta = await fetch(`/api/produto_mais_barato?produto=${encodeURIComponent(produto)}`);
                if (resposta.ok) {
                    const dados = await resposta.json();
                    avisoPreco.innerHTML = `💡 Mais barato no <strong>${dados.supermercado}</strong> por ${dados.preco.toFixed(2)}€.`;
                    avisoPreco.style.display = 'block';
                } else {
                    avisoPreco.style.display = 'none';
                }
            } catch (erro) {
                console.error("Erro ao buscar preço mais barato:", erro);
                avisoPreco.style.display = 'none';
            }
        });
    }

    // =========================================================================
    // 4. CARREGAR E EXIBIR A LISTA DE COMPRAS (com suporte a partilha e permissões)
    // =========================================================================
    async function carregarCompras() {
        try {
            const resposta = await fetch('/api/compras');
            if (!resposta.ok) {
                const erroDB = await resposta.json();
                alert("ERRO AO CARREGAR LISTA: " + erroDB.erro);
                return;
            }
            const itens = await resposta.json();
            todasAsComprasGlobais = itens;

            const divLista = document.getElementById('lista-itens');
            divLista.innerHTML = '';
            let total = 0;

            // Aviso se a lista for partilhada (algum item com is_owner=0)
            document.querySelectorAll('.shared-list-warning').forEach(el => el.remove());
            const sharedItems = itens.filter(item => item.is_owner === 0);
            if (sharedItems.length > 0) {
                const ownerName = sharedItems[0]?.owner_name || 'um amigo';
                const canEdit = sharedItems.some(item => item.can_edit == 1);
                const warningText = canEdit 
                    ? `📌 Contém itens partilhados por ${escapeHtml(ownerName)} (podes editar)`
                    : `📌 Contém itens partilhados por ${escapeHtml(ownerName)} (apenas visualização)`;
                const warning = document.createElement('div');
                warning.className = 'shared-list-warning';
                warning.innerHTML = warningText;
                divLista.parentNode.insertBefore(warning, divLista);
            }

            if (itens.length === 0) {
                divLista.innerHTML = '<div class="vazio"><span class="material-icons">shopping_cart</span><p>Carrinho vazio</p></div>';
                document.getElementById('valor-total').innerText = '0.00';
                atualizarFiltroSupermercadosPrincipal([]);
                aplicarFiltroPrincipal();
                return;
            }

            itens.forEach(item => {
                if (!item.comprado) total += (item.quantidade * item.preco_unidade);
                const subtotal = (item.quantidade * item.preco_unidade).toFixed(2);
                const precoUnidade = (item.preco_unidade).toFixed(2);

                const div = document.createElement('div');
                div.className = `item-compra ${item.comprado ? 'item-comprado' : ''}`;
                div.setAttribute('data-supermercado', item.supermercado || '');

                const isOwner = item.is_owner === 1;
                const canEdit = item.can_edit == 1;
                const buttonsDisabled = (!isOwner && !canEdit);

                const toggleDisabled = buttonsDisabled ? 'disabled' : '';
                const removeDisabled = buttonsDisabled ? 'disabled' : '';

                div.innerHTML = `
                    <div class="item-info">
                        <span class="item-nome">${item.quantidade}x <strong>${escapeHtml(item.produto)}</strong></span>
                        <small class="item-detalhe">${item.supermercado || 'Qualquer'} | ${precoUnidade}€/un</small>
                    </div>
                    <div class="item-preco-zona">
                        <span class="preco-individual">${subtotal}€</span>
                        <div class="acoes-item">
                            <button class="btn-toggle" onclick="alternarCompra(${item.id})" title="${item.comprado ? 'Marcar como não comprado' : 'Marcar como comprado'}" ${toggleDisabled}>
                                <span class="material-icons">${item.comprado ? 'undo' : 'check_circle'}</span>
                            </button>
                            <button class="btn-remove" onclick="removerCompra(${item.id})" title="Remover" ${removeDisabled}>
                                <span class="material-icons">delete</span>
                            </button>
                        </div>
                    </div>
                `;
                div.style.animation = 'fadeInUp 0.3s ease';
                divLista.appendChild(div);
            });

            document.getElementById('valor-total').innerText = total.toFixed(2);
            atualizarFiltroSupermercadosPrincipal(itens);
            aplicarFiltroPrincipal();
            atualizarFiltrosModoCompras();
            if (document.getElementById('modalModoCompras').style.display === 'block') {
                renderizarModoCompras();
            }
        } catch (erro) {
            console.error("Erro fatal ao carregar compras:", erro);
        }
    }

    // =========================================================================
    // 5. ADICIONAR, ALTERNAR E REMOVER ITENS (APIs)
    // =========================================================================
    document.getElementById('formCompras').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dados = {
            produto: selectProduto.value,
            supermercado: selectSupermercado.value,
            quantidade: parseInt(document.getElementById('quantidade').value),
            preco_unidade: parseFloat(inputPreco.value)
        };
        try {
            const resposta = await fetch('/api/compras', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });
            if (resposta.ok) {
                selectProduto.value = "";
                document.getElementById('quantidade').value = 1;
                inputPreco.value = '';
                if (avisoPreco) avisoPreco.style.display = 'none';
                carregarCompras();
            } else {
                const erroDB = await resposta.json();
                alert("Erro na BD: " + (erroDB.erro || "Erro desconhecido."));
            }
        } catch (erro) {
            console.error("Erro no JavaScript:", erro);
            alert("Erro ao processar a resposta. Verifique a consola (F12).");
        }
    });

    /**
     * Alterna o estado de comprado/não comprado de um item.
     * Se o modal estiver aberto, atualiza a UI imediatamente e depois chama a API.
     * Se o modal estiver fechado, recarrega a lista toda.
     * @param {number} id - ID do item a alternar
     * @param {HTMLElement} [checkboxElement] - Opcional: o elemento checkbox do modal para atualização direta (usado internamente)
     */
    async function alternarCompra(id, checkboxElement) {
        const item = todasAsComprasGlobais.find(i => i.id === id);
        if (!item) return;

        // Verifica permissões
        if (item.is_owner != 1 && item.can_edit != 1) {
            alert('Não tens permissão para editar este item.');
            if (checkboxElement) {
                checkboxElement.checked = !checkboxElement.checked; // reverter
            }
            return;
        }

        // Inverte estado localmente (otimista)
        const novoEstado = !item.comprado;
        item.comprado = novoEstado;

        // Se o modal está aberto, atualiza a UI sem recarregar
        const modal = document.getElementById('modalModoCompras');
        if (modal && modal.style.display === 'block') {
            // Procura a div do item no modal
            const divItem = document.querySelector(`.item-modo-compras[data-id="${id}"]`);
            if (divItem) {
                const checkbox = divItem.querySelector('.checkbox-gigante');
                if (checkbox) checkbox.checked = novoEstado;
                if (novoEstado) divItem.classList.add('comprado');
                else divItem.classList.remove('comprado');
            }
        }

        // Envia a atualização ao servidor
        try {
            const resposta = await fetch(`/api/compras/${id}/alternar`, { method: 'PUT' });
            if (!resposta.ok) {
                // Em caso de erro, reverter localmente
                item.comprado = !novoEstado;
                if (modal && modal.style.display === 'block') {
                    const divItem = document.querySelector(`.item-modo-compras[data-id="${id}"]`);
                    if (divItem) {
                        const checkbox = divItem.querySelector('.checkbox-gigante');
                        if (checkbox) checkbox.checked = !novoEstado;
                        if (!novoEstado) divItem.classList.add('comprado');
                        else divItem.classList.remove('comprado');
                    }
                }
                const erro = await resposta.json();
                alert(`Erro do servidor: ${erro.erro || 'Permissão negada'}`);
            }
        } catch (erro) {
            console.error('Erro na chamada API:', erro);
            // Reverter localmente também em caso de falha de rede
            item.comprado = !novoEstado;
            if (modal && modal.style.display === 'block') {
                const divItem = document.querySelector(`.item-modo-compras[data-id="${id}"]`);
                if (divItem) {
                    const checkbox = divItem.querySelector('.checkbox-gigante');
                    if (checkbox) checkbox.checked = !novoEstado;
                    if (!novoEstado) divItem.classList.add('comprado');
                    else divItem.classList.remove('comprado');
                }
            }
            alert('Erro de rede. Tente novamente.');
        }

        // Se o modal estiver fechado, recarrega a lista principal
        if (!modal || modal.style.display !== 'block') {
            carregarCompras();
        }
    }

    async function removerCompra(id) {
        const item = todasAsComprasGlobais.find(i => i.id === id);
        
        if (item && item.is_owner != 1 && item.can_edit != 1) {
            alert('Não tens permissão para remover este item.');
            return;
        }
        if (confirm("Remover do carrinho?")) {
            await fetch(`/api/compras/${id}`, { method: 'DELETE' });
            carregarCompras();
        }
    }

    // =========================================================================
    // 6. CONTROLE DE QUANTIDADE (botões +/-)
    // =========================================================================
    const qtyInput = document.getElementById('quantidade');
    const minusBtn = document.getElementById('qty-minus');
    const plusBtn = document.getElementById('qty-plus');
    if (minusBtn && plusBtn && qtyInput) {
        minusBtn.addEventListener('click', () => {
            let val = parseInt(qtyInput.value) || 1;
            if (val > 1) qtyInput.value = val - 1;
        });
        plusBtn.addEventListener('click', () => {
            let val = parseInt(qtyInput.value) || 1;
            qtyInput.value = val + 1;
        });
    }

    // =========================================================================
    // 7. FILTRO POR SUPERMERCADO NA PÁGINA PRINCIPAL
    // =========================================================================
    function atualizarFiltroSupermercadosPrincipal(itens) {
        const select = document.getElementById('filtroSupermercadoPrincipal');
        if (!select) return;
        const supermercados = new Set();
        itens.forEach(item => {
            if (item.supermercado && item.supermercado.trim() !== '') {
                supermercados.add(item.supermercado);
            }
        });
        const valorAtual = select.value;
        while (select.options.length > 1) select.remove(1);
        Array.from(supermercados).sort().forEach(supermercado => {
            const option = document.createElement('option');
            option.value = supermercado;
            option.textContent = supermercado;
            select.appendChild(option);
        });
        if (valorAtual && supermercados.has(valorAtual)) {
            select.value = valorAtual;
        } else {
            select.value = '';
            filtroAtivo = '';
        }
    }

    function aplicarFiltroPrincipal() {
        const select = document.getElementById('filtroSupermercadoPrincipal');
        filtroAtivo = select ? select.value : '';
        const itens = document.querySelectorAll('.item-compra');
        let totalFiltrado = 0;
        itens.forEach(item => {
            const supermercadoItem = item.getAttribute('data-supermercado') || '';
            const deveMostrar = (filtroAtivo === '' || supermercadoItem === filtroAtivo);
            item.style.display = deveMostrar ? 'flex' : 'none';
            if (deveMostrar && !item.classList.contains('item-comprado')) {
                const precoSpan = item.querySelector('.preco-individual');
                if (precoSpan) {
                    const precoTexto = precoSpan.innerText.replace('€', '').trim();
                    const preco = parseFloat(precoTexto);
                    if (!isNaN(preco)) totalFiltrado += preco;
                }
            }
        });
        const totalElement = document.getElementById('valor-total');
        if (totalElement) totalElement.innerText = totalFiltrado.toFixed(2);
    }

    const filtroSelectPrincipal = document.getElementById('filtroSupermercadoPrincipal');
    const limparBtn = document.getElementById('limparFiltro');
    if (filtroSelectPrincipal) filtroSelectPrincipal.addEventListener('change', aplicarFiltroPrincipal);
    if (limparBtn) limparBtn.addEventListener('click', () => {
        if (filtroSelectPrincipal) filtroSelectPrincipal.value = '';
        aplicarFiltroPrincipal();
    });

    // =========================================================================
    // 8. MODO COMPRAS (pop‑up) – com checkboxes funcionais
    // =========================================================================
    const modalModoCompras = document.getElementById('modalModoCompras');
    const btnModoCompras = document.getElementById('btnModoCompras');
    const closeModoCompras = document.getElementById('closeModoCompras');
    const filtroModoCompras = document.getElementById('filtroModoCompras');
    const listaModoCompras = document.getElementById('listaModoCompras');

    if (btnModoCompras && modalModoCompras) {
        btnModoCompras.addEventListener('click', () => {
            modalModoCompras.style.display = 'block';
            atualizarFiltrosModoCompras();
            renderizarModoCompras();
        });
    } else {
        console.error('Elementos do modo compras não encontrados!');
    }

    if (closeModoCompras) {
        closeModoCompras.addEventListener('click', () => {
            modalModoCompras.style.display = 'none';
            carregarCompras(); // Atualiza a lista principal ao fechar
        });
    }
    window.addEventListener('click', (event) => {
        if (event.target == modalModoCompras) {
            modalModoCompras.style.display = 'none';
            carregarCompras(); // Atualiza a lista principal ao fechar
        }
    });

    function atualizarFiltrosModoCompras() {
        const supermercadosDisponiveis = new Set();
        todasAsComprasGlobais.forEach(compra => supermercadosDisponiveis.add(compra.supermercado));
        const valorAtual = filtroModoCompras.value || 'Todos';
        filtroModoCompras.innerHTML = '<option value="Todos">Todos os Supermercados</option>';
        supermercadosDisponiveis.forEach(sup => {
            if (sup) {
                const option = document.createElement('option');
                option.value = sup;
                option.textContent = `Apenas ${sup}`;
                filtroModoCompras.appendChild(option);
            }
        });
        if (Array.from(filtroModoCompras.options).some(opt => opt.value === valorAtual)) {
            filtroModoCompras.value = valorAtual;
        } else {
            filtroModoCompras.value = 'Todos';
        }
    }

    filtroModoCompras.addEventListener('change', renderizarModoCompras);

    /**
     * Renderiza os itens no modo compras.
     * Cada item é uma div com uma checkbox funcional.
     * A checkbox tem um evento onchange que chama alternarCompra com o ID e a própria checkbox.
     */
    function renderizarModoCompras() {
    listaModoCompras.innerHTML = '';
    const filtro = filtroModoCompras.value;
    const comprasFiltradas = todasAsComprasGlobais.filter(c => filtro === 'Todos' || c.supermercado === filtro);
    
    if (comprasFiltradas.length === 0) {
        listaModoCompras.innerHTML = `
            <div style="text-align:center; color:#aaa; margin-top:40px;">
                <span class="material-icons" style="font-size: 3rem; opacity: 0.5;">remove_shopping_cart</span>
                <p style="font-size: 1.1rem; margin-top: 10px;">Não tens produtos registados<br>para este supermercado.</p>
            </div>`;
        return;
    }

    comprasFiltradas.forEach(compra => {
        // Verifica permissões
        const isOwner = compra.is_owner == 1 || compra.is_owner === true;
        const canEdit = compra.can_edit == 1 || compra.can_edit === true;
        const hasEditPermission = isOwner || canEdit;
        
        const div = document.createElement('div');
        div.className = `item-modo-compras ${compra.comprado ? 'comprado' : ''}`;
        div.setAttribute('data-id', compra.id);
        
        const precoExibicao = (compra.preco_unidade || 0).toFixed(2);
        const iconeLoja = compra.supermercado ? 'storefront' : 'help_outline';
        
        // Cria a checkbox (apenas visual, sem evento próprio)
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'checkbox-gigante';
        checkbox.checked = compra.comprado;
        checkbox.disabled = !hasEditPermission;
        // Remove qualquer pointer-events que possa estar no CSS
        checkbox.style.pointerEvents = 'none';
        
        // Conteúdo do item
        div.innerHTML = `
            <div class="modo-info">
                <span class="nome">${compra.quantidade}x ${escapeHtml(compra.produto)}</span>
                <span class="supermercado">
                    <span class="material-icons" style="font-size: 16px;">${iconeLoja}</span>
                    ${compra.supermercado || 'Qualquer Supermercado'}
                </span>
                <span class="preco">${precoExibicao}€ /un</span>
            </div>
        `;
        
        div.appendChild(checkbox);
        
        // Se tiver permissão, adiciona o evento de clique na div
        if (hasEditPermission) {
            div.style.cursor = 'pointer';
            div.onclick = async (e) => {
                // Impede que o clique na checkbox dispare duas vezes
                if (e.target === checkbox) return;
                // Chama a função que alterna o estado
                await alternarCompra(compra.id);
            };
        } else {
            div.style.opacity = '0.6';
            div.style.cursor = 'not-allowed';
        }
        
        listaModoCompras.appendChild(div);
    });
}

    // =========================================================================
    // 9. GESTÃO DE AMIGOS (modal e funções)
    // =========================================================================
    async function abrirModalAmigos() {
        const modalAmigos = document.getElementById('modalAmigos');
        const content = document.getElementById('amigosContent');
        modalAmigos.style.display = 'flex';
        try {
            const resp = await fetch('/api/friends');
            const data = await resp.json();

            let html = `
                <div style="margin-bottom: 20px;">
                    <h4>Adicionar amigo por username ou e-mail</h4>
                    <input type="text" id="emailAmigo" placeholder="Username ou e-mail" style="width: 100%; margin-bottom: 10px;">
                    <button id="btnAddAmigo" class="btn-add">Enviar pedido</button>
                </div>
                <hr>
                <h4>Pedidos pendentes recebidos</h4>
                <div id="pedidosRecebidos">
            `;
            if (data.pending && data.pending.length) {
                data.pending.forEach(p => {
                    const displayName = getDisplayName(p);
                    const info = `${displayName} (${escapeHtml(p.username)}${p.email ? ' - ' + escapeHtml(p.email) : ''})`;
                    html += `<div class="amigo-item">
                                <span>${info}</span>
                                <div class="btn-group">
                                    <button onclick="aceitarPedido(${p.request_id})">✔ Aceitar</button>
                                    <button onclick="recusarPedido(${p.request_id})">✖ Recusar</button>
                                </div>
                            </div>`;
                });
            } else html += '<p>Nenhum pedido pendente</p>';
            html += `</div><hr><h4>Os teus amigos</h4><div id="listaAmigos">`;
            if (data.friends && data.friends.length) {
                data.friends.forEach(f => {
                    const displayName = getDisplayName(f);
                    const info = `${displayName} (${escapeHtml(f.username)}${f.email ? ' - ' + escapeHtml(f.email) : ''})`;
                    html += `<div class="amigo-item">
                                <span>${info}</span>
                                <div class="btn-group">
                                    <button onclick="removerAmigo(${f.id})">🗑 Remover</button>
                                </div>
                            </div>`;
                });
            } else html += '<p>Nenhum amigo adicionado</p>';
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('btnAddAmigo').addEventListener('click', enviarPedidoAmigo);
        } catch (e) {
            console.error(e);
            content.innerHTML = '<p>Erro ao carregar dados de amigos.</p>';
        }
    }

    async function enviarPedidoAmigo() {
        const identifier = document.getElementById('emailAmigo').value.trim();
        if (!identifier) return alert('Insira um username ou e-mail');
        try {
            const resp = await fetch('/api/friends/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: identifier })
            });
            const data = await resp.json();
            if (resp.ok) {
                alert('Pedido enviado!');
                document.getElementById('emailAmigo').value = '';
                abrirModalAmigos();
            } else alert('Erro: ' + (data.erro || 'Desconhecido'));
        } catch (e) { console.error(e); }
    }

    async function aceitarPedido(requestId) {
        const resp = await fetch(`/api/friends/accept/${requestId}`, { method: 'PUT' });
        if (resp.ok) abrirModalAmigos();
        else alert('Erro ao aceitar pedido');
    }

    async function recusarPedido(requestId) {
        const resp = await fetch(`/api/friends/decline/${requestId}`, { method: 'DELETE' });
        if (resp.ok) abrirModalAmigos();
        else alert('Erro ao recusar pedido');
    }

    async function removerAmigo(friendId) {
        if (confirm('Remover este amigo?')) {
            const resp = await fetch(`/api/friends/remove/${friendId}`, { method: 'DELETE' });
            if (resp.ok) abrirModalAmigos();
            else alert('Erro ao remover amigo');
        }
    }

    document.getElementById('openFriendsModal').addEventListener('click', (e) => {
        e.preventDefault();
        abrirModalAmigos();
    });
    document.getElementById('closeAmigosModal').addEventListener('click', () => {
        document.getElementById('modalAmigos').style.display = 'none';
    });

    // =========================================================================
    // 10. PARTILHA DA LISTA DE COMPRAS (com permissão de edição)
    // =========================================================================
    const shareShoppingModal = document.getElementById('modalShareShopping');
    const btnShareShopping = document.getElementById('btnShareShoppingList');
    const closeShareShopping = document.getElementById('closeShareShoppingModal');
    const btnConfirmShareShopping = document.getElementById('btnConfirmShareShopping');

    async function abrirModalPartilhaShopping() {
        shareShoppingModal.style.display = 'flex';
        try {
            const [amigosResp, sharesResp] = await Promise.all([
                fetch('/api/friends/list'),
                fetch('/api/shopping/shares')
            ]);
            const amigos = await amigosResp.json();
            const shares = sharesResp.ok ? await sharesResp.json() : [];
            const shareMap = {};
            shares.forEach(s => { shareMap[s.id] = s.can_edit; });

            let html = `<div style="max-height: 400px; overflow-y: auto;">`;
            if (amigos.length === 0) html += '<p>Não tens amigos adicionados.</p>';
            else {
                amigos.forEach(amigo => {
                    const isShared = shareMap.hasOwnProperty(amigo.id);
                    const canEdit = shareMap[amigo.id] || false;
                    html += `
                        <div class="share-friend-item">
                            <div class="share-friend-info">${getDisplayName(amigo)}</div>
                            <div class="share-friend-options">
                                <label>
                                    <input type="checkbox" class="share-checkbox" data-friend-id="${amigo.id}" ${isShared ? 'checked' : ''}>
                                    Partilhar
                                </label>
                                <label class="edit-permission-label" style="${!isShared ? 'opacity:0.5;' : ''}">
                                    <input type="checkbox" class="edit-checkbox" data-friend-id="${amigo.id}" ${canEdit ? 'checked' : ''} ${!isShared ? 'disabled' : ''}>
                                    Editar
                                </label>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`;
            document.getElementById('shareShoppingContent').innerHTML = html;

            document.querySelectorAll('.share-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const friendId = cb.dataset.friendId;
                    const editCheckbox = document.querySelector(`.edit-checkbox[data-friend-id="${friendId}"]`);
                    if (editCheckbox) {
                        editCheckbox.disabled = !cb.checked;
                        const label = editCheckbox.closest('.edit-permission-label');
                        if (label) label.style.opacity = cb.checked ? '1' : '0.5';
                    }
                });
            });
        } catch (e) {
            console.error(e);
            document.getElementById('shareShoppingContent').innerHTML = '<p>Erro ao carregar amigos.</p>';
        }
    }

    btnShareShopping.onclick = abrirModalPartilhaShopping;
    closeShareShopping.onclick = () => shareShoppingModal.style.display = 'none';

    btnConfirmShareShopping.onclick = async () => {
        const shareCheckboxes = document.querySelectorAll('#shareShoppingContent .share-checkbox');
        const toShare = [];
        const toUnshare = [];
        shareCheckboxes.forEach(cb => {
            const friendId = parseInt(cb.dataset.friendId);
            const isChecked = cb.checked;
            const editCheckbox = document.querySelector(`.edit-checkbox[data-friend-id="${friendId}"]`);
            const canEdit = editCheckbox ? editCheckbox.checked : false;
            if (isChecked) toShare.push({ friendId, canEdit });
            else toUnshare.push(friendId);
        });
        try {
            for (let { friendId, canEdit } of toShare) {
                await fetch('/api/shopping/share', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ friend_id: friendId, can_edit: canEdit })
                });
            }
            for (let friendId of toUnshare) {
                await fetch(`/api/shopping/unshare/${friendId}`, { method: 'DELETE' });
            }
            shareShoppingModal.style.display = 'none';
            carregarCompras();
        } catch (e) {
            console.error(e);
            alert('Erro ao atualizar partilhas.');
        }
    };

    // =========================================================================
    // 11. MENU HAMBÚRGUER E LOGOUT
    // =========================================================================
    const hamburgerIcon = document.querySelector('.hamburger-icon');
    const dropdown = document.querySelector('.menu-dropdown');
    if (hamburgerIcon && dropdown) {
        hamburgerIcon.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && !hamburgerIcon.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
    }

    async function fazerLogout() {
        try {
            await fetch('/api/logout');
            window.location.href = "/login";
        } catch (erro) {
            console.error("Erro ao fazer logout:", erro);
            window.location.href = "/login";
        }
    }

    // =========================================================================
    // 12. INICIALIZAÇÃO
    // =========================================================================
    document.addEventListener("DOMContentLoaded", carregarCompras);
</script>
</body>
</html>
