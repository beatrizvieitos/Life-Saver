<!DOCTYPE html>
<html lang="pt-PT"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Saver</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='logomini.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

<div class="logo-topo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Task Boss Logo" style="margin-top: -60px; width: 300px; height: auto; border-radius: 10%;">
</div>

<div class="caixa-auth">
    <div id="seccao-login">
        <h2>Entra na tua conta 🛟</h2>
        <div id="msg_login"></div>
        <form id="formLogin">
            <input type="text" id="login_username" placeholder="Nome de Utilizador" required>
            <div style="position: relative; width: 100%; margin-bottom: 15px;">
                <input type="password" id="login_password" placeholder="Palavra-passe" required 
                       style="width: 100%; padding-right: 40px; margin-bottom: 0;">
                <span onclick="togglePass('login_password', this)" 
                      style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none;">
                    👁️
                </span>
            </div>
            <button type="submit" class="btn-add btn-largo">ENTRAR</button>
        </form>
        <span class="link-alternar" onclick="alternarVistas('registo')">Regista-te e começa a gerir a tua vida!</span>
        <div style="margin-top: 15px; font-size: 0.9em; text-align: center;">
            <a href="#" id="linkEsqueciUsername" style="color: var(--accent-primary); text-decoration: none;">Esqueci-me do Utilizador</a> | 
            <a href="#" id="linkEsqueciPassword" style="color: var(--accent-primary); text-decoration: none;">Esqueci-me da Palavra-passe</a>
        </div>
    </div>

    <div id="seccao-registo">
        <h2>Criar Conta</h2>
        <div id="msg_registo" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></div>
        <form id="formRegisto">
            <input type="text" id="reg_nome" placeholder="Nome" required>
            <input type="text" id="reg_apelido" placeholder="Apelido" required>
            <input type="text" id="reg_username" placeholder="Nome de Utilizador" required>
            <input type="email" id="reg_email" placeholder="E-mail" required>
            <input type="text" id="reg_localidade" placeholder="Localidade" required>
            <div style="position: relative; width: 100%;">
                <input type="password" id="reg_password" placeholder="Palavra-passe" required style="padding-right: 40px;">
                <span onclick="togglePass('reg_password', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">👁️</span>
            </div>
            <button type="submit" class="btn-add btn-largo">REGISTAR</button>
        </form>
        <span class="link-alternar" onclick="alternarVistas('login')">Já tens conta? Faz Login.</span>
    </div>
</div>

<div id="modalRecuperacao" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center;">
    <div class="modal-content" style="background-color: var(--card-bg, #27707b); margin: 15% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: var(--shadow, 0 10px 25px -5px rgba(0,0,0,0.5)); position: relative; text-align: center;">
        <span id="fecharModalRecuperacao" style="color: var(--accent, #e3e3e3); float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2 id="tituloModalRecuperacao" style="color: var(--accent, #e3e3e3); margin-top: 0;">Recuperação</h2>
        <p id="descricaoModalRecuperacao" style="color: var(--text-dim, #d2c1c1); font-size: 0.9em; margin-bottom: 20px;">Introduz o teu e-mail:</p>
        <form id="formRecuperacao" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="email" id="emailRecuperacao" placeholder="O teu e-mail de registo" required 
                   style="padding: 12px; border-radius: 8px; border: 1px solid var(--border, #e2b3345d); background-color: rgba(255, 255, 255, 0.9); color: #333; font-size: 1em;">
            <button type="submit" class="btn-supermercado" style="background-color: var(--accent-primary, #ca9607); color: #fff; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;">
                Enviar
            </button>
        </form>
        <div id="msgRecuperacao" style="margin-top: 15px; font-weight: bold; font-size: 0.9em;"></div>
    </div>
</div>

<script>
    // ========== FUNÇÕES AUXILIARES E NOTIFICAÇÕES ==========
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showMessage(mensagem) {
        const notExistente = document.querySelector('.notificacao');
        if (notExistente) notExistente.remove();

        const div = document.createElement('div');
        div.className = 'notificacao';
        div.innerHTML = `
            <p>${escapeHtml(mensagem)}</p>
            <button onclick="this.parentElement.remove()">OK</button>
        `;
        document.body.appendChild(div);

        setTimeout(() => {
            if (div && div.parentElement) div.remove();
        }, 3000);
    }

    function togglePass(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.innerText = "🙈";
        } else {
            input.type = "password";
            el.innerText = "👁️";
        }
    }

    function alternarVistas(vista) {
        const login = document.getElementById('seccao-login');
        const registo = document.getElementById('seccao-registo');
        document.getElementById('msg_login').innerText = '';
        document.getElementById('msg_registo').innerText = '';

        if (vista === 'registo') {
            login.style.display = 'none';
            registo.style.display = 'block';
        } else {
            registo.style.display = 'none';
            login.style.display = 'block';
        }
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('msg_login');
        const dados = {
            username: document.getElementById('login_username').value,
            password: document.getElementById('login_password').value
        };
        try {
            const resposta = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            if (resposta.ok) {
                window.location.href = "/";
            } else {
                const resultado = await resposta.json();
                msgDiv.innerText = resultado.erro || "Utilizador ou palavra-passe incorretos!";
                msgDiv.style.color = "#ff4444";
                document.getElementById('login_password').value = "";
            }
        } catch (erro) {
            msgDiv.innerText = "Erro ao ligar ao servidor.";
            msgDiv.style.color = "#ffbb33";
        }
    });

    document.getElementById('formRegisto').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('msg_registo');
        const dados = {
            nome: document.getElementById('reg_nome').value,
            apelido: document.getElementById('reg_apelido').value,
            username: document.getElementById('reg_username').value,
            email: document.getElementById('reg_email').value,
            password: document.getElementById('reg_password').value,
            localidade: document.getElementById('reg_localidade').value
        };
        try {
            const resposta = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            if (resposta.ok) {
                showMessage("Conta criada com sucesso! Já podes entrar.");
                alternarVistas('login');
            } else {
                const erro = await resposta.json();
                msgDiv.style.color = "#ff4444";
                msgDiv.innerText = erro.erro || "Erro ao criar conta.";
            }
        } catch (erro) {
            msgDiv.innerText = "Erro ao ligar ao servidor.";
        }
    });

    // Captura os elementos do DOM
    const modalRecuperacao = document.getElementById('modalRecuperacao');
    const fecharModal = document.getElementById('fecharModalRecuperacao');
    const formRecuperacao = document.getElementById('formRecuperacao');
    const tituloModal = document.getElementById('tituloModalRecuperacao');
    const descModal = document.getElementById('descricaoModalRecuperacao');
    const emailInput = document.getElementById('emailRecuperacao');
    const msgRecuperacao = document.getElementById('msgRecuperacao');

    let tipoRecuperacao = ''; // Vai guardar se é 'username' ou 'password'

    // Abrir modal para "Esqueci-me do Utilizador"
    document.getElementById('linkEsqueciUsername').addEventListener('click', (e) => {
        e.preventDefault();
        tipoRecuperacao = 'username';
        tituloModal.innerText = 'Recuperar Utilizador 👤';
        descModal.innerText = 'Introduz o teu e-mail para receberes o teu nome de utilizador.';
        abrirModal();
    });

    // Abrir modal para "Esqueci-me da Palavra-passe"
    document.getElementById('linkEsqueciPassword').addEventListener('click', (e) => {
        e.preventDefault();
        tipoRecuperacao = 'password';
        tituloModal.innerText = 'Recuperar Palavra-passe 🔑';
        descModal.innerText = 'Introduz o teu e-mail. Enviaremos um link de redefinição.';
        abrirModal();
    });

    function abrirModal() {
        emailInput.value = ''; // Limpa o input
        msgRecuperacao.innerText = ''; // Limpa mensagens anteriores
        modalRecuperacao.style.display = 'flex'; // Mostra o modal
    }

    // Fechar o modal no "X"
    fecharModal.addEventListener('click', () => {
        modalRecuperacao.style.display = 'none';
    });

    // Fechar o modal se o utilizador clicar fora da caixa
    window.addEventListener('click', (e) => {
        if (e.target === modalRecuperacao) {
            modalRecuperacao.style.display = 'none';
        }
    });

    // Lidar com o envio do formulário do modal
    formRecuperacao.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = emailInput.value;
        
        // Mostra que está a carregar
        msgRecuperacao.innerText = 'A enviar pedido... ⏳';
        msgRecuperacao.style.color = 'var(--accent, #e3e3e3)';

        // Decide qual é o endpoint com base no botão que o utilizador clicou antes
        const endpoint = tipoRecuperacao === 'username' ? '/api/esqueci_username' : '/api/esqueci_password';

        try {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            const data = await res.json();
            
            if (res.ok) {
                msgRecuperacao.style.color = '#00C851'; // Verde sucesso
                msgRecuperacao.innerText = data.mensagem;
                
                // Fecha o modal automaticamente após 3.5 segundos em caso de sucesso
                setTimeout(() => {
                    modalRecuperacao.style.display = 'none';
                }, 3500);
            } else {
                msgRecuperacao.style.color = '#ff4444'; // Vermelho erro
                msgRecuperacao.innerText = data.erro || 'Ocorreu um erro inesperado.';
            }
        } catch (err) {
            msgRecuperacao.style.color = '#ff4444';
            msgRecuperacao.innerText = "Erro de ligação. Verifica a tua internet.";
        }
    });
</script>
</body>
</html>
