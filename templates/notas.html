<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>As Minhas Notas - Life Saver</title>
    <link rel="icon" href="{{ url_for('static', filename='logomini.ico') }}?v=3" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body> 
    <div class="logo-topo-container">
    <a href="/" class="logo-link">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Task Boss Logo">
    </a>
</div>
    
    <div class="cabecalho">
        <div class="esquerda">
            <div class="menu-hamburger" id="menuHamburger">
                <div class="hamburger-icon">☰</div>
                <div class="menu-dropdown" id="menuDropdown">
                    <a href="/" class="menu-item">Lista de Tarefas 📋</a>
                    <a href="/listas" class="menu-item">Lista de Compras 🛒</a>
                    <a href="/medicamentos" class="menu-item">Lista de Medicamentos 💊</a>
                    <a href="/estatisticas" class="menu-item">Estatísticas 📊</a>
                    <a href="#" id="openFriendsModal" class="menu-item">Amigos 👥</a>
                </div>
            </div>
        </div>
        
        <div class="centro">
            <h2>As Minhas Notas</h2>
        </div>
        <button class="menu-item" id="btnAbrirModalNota">+ Adicionar Nota</button>
        <div class="direita">
            <button class="btn-sair" onclick="fazerLogout()" title="Sair">
    <span class="material-icons">logout</span>
</button>
        </div>
    </div>

    <div id="lista-notas" class="notas-grid"></div>
</div>

<!-- MODAL PARA ADICIONAR NOTA -->
<div id="modalNota" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Nova Nota</h3>
            <span class="close-modal">&times;</span>
        </div>
        <form id="formNovaNota">
            <input type="text" id="titulo_nota" placeholder="Título da nota" required>
            <textarea id="conteudo_nota" rows="5" placeholder="Escreve aqui a tua nota..." required></textarea>
            <button type="submit" class="btn-add">Criar Nota</button>
        </form>
    </div>
</div>

<!-- Modal para gestão de amigos -->
<div id="modalAmigos" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <div class="modal-header">
            <h3>Amigos</h3>
            <span class="close-modal" id="closeAmigosModal">&times;</span>
        </div>
        <div id="amigosContent"></div>
    </div>
</div>

<script>
    // === Modal handling ===
    const modal = document.getElementById('modalNota');
    const btnAbrir = document.getElementById('btnAbrirModalNota');
    const closeSpan = document.querySelector('.close-modal');

    btnAbrir.onclick = function() {
        modal.style.display = 'flex';
        document.getElementById('titulo_nota').value = '';
        document.getElementById('conteudo_nota').value = '';
    }
    closeSpan.onclick = function() { modal.style.display = 'none'; }
    window.onclick = function(event) { if (event.target == modal) modal.style.display = 'none'; }

    // === Funções das notas (mantidas) ===
    document.addEventListener("DOMContentLoaded", carregarNotas);

    async function carregarNotas() {
        try {
            const resposta = await fetch('/api/notas');
            const notas = await resposta.json();
            const grid = document.getElementById('lista-notas');
            grid.innerHTML = '';

            notas.forEach(nota => {
                const div = document.createElement('div');
                div.className = 'post-it';
                div.innerHTML = `
                    <div class="post-it-header">
                        <input type="text" class="post-it-titulo" value="${escapeHtml(nota.titulo)}" 
                               onblur="guardarNota(${nota.id}, this)" placeholder="Título...">
                        <button class="btn-apagar-nota" onclick="apagarNota(${nota.id})">✖</button>
                    </div>
                    <textarea class="post-it-conteudo" onblur="guardarNota(${nota.id}, this)" 
                              placeholder="Escreve aqui...">${escapeHtml(nota.conteudo)}</textarea>
                `;
                grid.appendChild(div);
            });
        } catch (erro) {
            console.error("Erro ao carregar notas:", erro);
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    document.getElementById('formNovaNota').addEventListener('submit', async function(e) {
        e.preventDefault();
        const titulo = document.getElementById('titulo_nota').value.trim();
        const conteudo = document.getElementById('conteudo_nota').value.trim();

        try {
            const respostaCriar = await fetch('/api/notas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            if (!respostaCriar.ok) throw new Error('Erro ao criar nota');
            const novaNota = await respostaCriar.json();
            const idNota = novaNota.id;

            await fetch(`/api/notas/${idNota}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, conteudo })
            });

            modal.style.display = 'none';
            carregarNotas();
        } catch (erro) {
            console.error(erro);
            alert('Erro ao criar nota. Tenta novamente.');
        }
    });

    async function guardarNota(id, elemento) {
        const postIt = elemento.closest('.post-it');
        const titulo = postIt.querySelector('.post-it-titulo').value;
        const conteudo = postIt.querySelector('.post-it-conteudo').value;

        try {
            await fetch(`/api/notas/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, conteudo })
            });
        } catch (erro) {
            console.error("Erro ao guardar nota:", erro);
        }
    }

    async function apagarNota(id) {
        if(confirm("Tens a certeza que queres apagar este post-it?")) {
            try {
                const resposta = await fetch(`/api/notas/${id}`, { method: 'DELETE' });
                if (resposta.ok) carregarNotas();
            } catch (erro) {
                console.error("Erro ao apagar nota:", erro);
            }
        }
    }

    async function fazerLogout() {
        try {
            await fetch('/api/logout');
            window.location.href = "/login";
        } catch (erro) {
            console.error("Erro ao fazer logout:", erro);
            window.location.href = "/login";
        }
    }

    // Menu hambúrguer
    const hamburgerIcon = document.querySelector('.hamburger-icon');
    const dropdown = document.querySelector('.menu-dropdown');
    if (hamburgerIcon && dropdown) {
        hamburgerIcon.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && !hamburgerIcon.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });

        // ========== FUNÇÕES PARA AMIGOS ==========
function getDisplayName(user) {
    if (user.nome && user.apelido) {
        return escapeHtml(user.nome) + ' ' + escapeHtml(user.apelido);
    } else if (user.username) {
        return escapeHtml(user.username);
    }
    return '';
}

async function abrirModalAmigos() {
    const modalAmigos = document.getElementById('modalAmigos');
    const content = document.getElementById('amigosContent');
    modalAmigos.style.display = 'flex';
    try {
        const resp = await fetch('/api/friends');
        const data = await resp.json();

        let html = `
            <div style="margin-bottom: 20px;">
                <h4>Adicionar amigo por username ou e-mail</h4>
                <input type="text" id="emailAmigo" placeholder="Username ou e-mail" style="width: 100%; margin-bottom: 10px;">
                <button id="btnAddAmigo" class="btn-add">Enviar pedido</button>
            </div>
            <hr>
            <h4>Pedidos pendentes recebidos</h4>
            <div id="pedidosRecebidos">
        `;
        if (data.pending && data.pending.length) {
            data.pending.forEach(p => {
                const displayName = getDisplayName(p);
                const info = `${displayName} (${escapeHtml(p.username)}${p.email ? ' - ' + escapeHtml(p.email) : ''})`;
                html += `<div class="amigo-item">
                            <span>${info}</span>
                            <div class="btn-group">
                                <button onclick="aceitarPedido(${p.request_id})">✔ Aceitar</button>
                                <button onclick="recusarPedido(${p.request_id})">✖ Recusar</button>
                            </div>
                        </div>`;
            });
        } else html += '<p>Nenhum pedido pendente</p>';
        html += `</div><hr><h4>Os teus amigos</h4><div id="listaAmigos">`;
        if (data.friends && data.friends.length) {
            data.friends.forEach(f => {
                const displayName = getDisplayName(f);
                const info = `${displayName} (${escapeHtml(f.username)}${f.email ? ' - ' + escapeHtml(f.email) : ''})`;
                html += `<div class="amigo-item">
                            <span>${info}</span>
                            <div class="btn-group">
                                <button onclick="removerAmigo(${f.id})">🗑 Remover</button>
                            </div>
                        </div>`;
            });
        } else html += '<p>Nenhum amigo adicionado</p>';
        html += `</div>`;
        content.innerHTML = html;
        document.getElementById('btnAddAmigo').addEventListener('click', enviarPedidoAmigo);
    } catch (e) {
        console.error(e);
        content.innerHTML = '<p>Erro ao carregar dados de amigos.</p>';
    }
}

async function enviarPedidoAmigo() {
    const identifier = document.getElementById('emailAmigo').value.trim();
    if (!identifier) return alert('Insira um username ou e-mail');
    try {
        const resp = await fetch('/api/friends/request', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: identifier })
        });
        const data = await resp.json();
        if (resp.ok) {
            alert('Pedido enviado!');
            document.getElementById('emailAmigo').value = '';
            abrirModalAmigos();
        } else alert('Erro: ' + (data.erro || 'Desconhecido'));
    } catch (e) { console.error(e); }
}

async function aceitarPedido(requestId) {
    const resp = await fetch(`/api/friends/accept/${requestId}`, { method: 'PUT' });
    if (resp.ok) abrirModalAmigos();
    else alert('Erro ao aceitar pedido');
}

async function recusarPedido(requestId) {
    const resp = await fetch(`/api/friends/decline/${requestId}`, { method: 'DELETE' });
    if (resp.ok) abrirModalAmigos();
    else alert('Erro ao recusar pedido');
}

async function removerAmigo(friendId) {
    if (confirm('Remover este amigo?')) {
        const resp = await fetch(`/api/friends/remove/${friendId}`, { method: 'DELETE' });
        if (resp.ok) abrirModalAmigos();
        else alert('Erro ao remover amigo');
    }
}

// Event listeners for the friends link and modal close
document.getElementById('openFriendsModal').addEventListener('click', (e) => {
    e.preventDefault();
    abrirModalAmigos();
});
document.getElementById('closeAmigosModal').addEventListener('click', () => {
    document.getElementById('modalAmigos').style.display = 'none';
});
    }
</script>
</body>
</html>
