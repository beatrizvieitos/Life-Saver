<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repor Palavra-passe - Life Saver</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='reset.css') }}">
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='logomini.ico') }}">
</head>
<body>

<div class="logo-topo">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="logo-reset">
</div>

<div class="caixa-auth caixa-reset">
    <h2 id="titulo">Nova Palavra-Passe 🔒</h2>
    <div id="msg_reset" class="msg-feedback"></div>
    
    <form id="formReset">
        <input type="password" id="nova_password" placeholder="Nova Palavra-passe" required class="input-reset">
        <input type="password" id="confirmar_password" placeholder="Confirmar Palavra-passe" required class="input-reset">
        
        <button type="submit" id="btnSubmeter" class="btn-add btn-full">
            ATUALIZAR PALAVRA-PASSE
        </button>
    </form>

    <div id="sucesso_container" class="sucesso-box">
        <p>Palavra-passe alterada com sucesso!</p>
        <a href="/login" class="btn-add btn-login">IR PARA O LOGIN</a>
    </div>
</div>

<script>
    const form = document.getElementById('formReset');
    const msgDiv = document.getElementById('msg_reset');
    const sucessoContainer = document.getElementById('sucesso_container');
    const token = "{{ token }}";

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const password = document.getElementById('nova_password').value;
        const confirm = document.getElementById('confirmar_password').value;

        if (password !== confirm) {
            msgDiv.style.color = '#ff4444';
            msgDiv.innerText = 'As palavras-passe não coincidem!';
            return;
        }

        msgDiv.style.color = '#e3e3e3';
        msgDiv.innerText = 'A processar... ⏳';

        try {
            const res = await fetch(window.location.pathname, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `password=${encodeURIComponent(password)}`
            });

            if (res.ok) {
                form.style.display = 'none';
                document.getElementById('titulo').innerText = 'Sucesso! ✅';
                msgDiv.innerText = '';
                sucessoContainer.style.display = 'block';
            } else {
                msgDiv.style.color = '#ff4444';
                msgDiv.innerText = 'Erro: Link inválido ou expirado.';
            }
        } catch (err) {
            msgDiv.style.color = '#ff4444';
            msgDiv.innerText = 'Erro de ligação ao servidor.';
        }
    });
</script>   

</body>
</html>
